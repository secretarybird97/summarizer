version: "3.8"

services:
  db:
    container_name: postgres
    image: postgres
    restart: always
    ports:
      - "5432:5432"
    env_file:
      - .env.example
    networks:
      - summarizer
    volumes:
      - ./db:/var/lib/postgresql/data

  backend:
    container_name: spring-boot
    restart: always
    build:
      context: ./backend
      dockerfile: dev.Dockerfile

    # Set environment variables directly in the docker-compose file
    # environment:
    #  ENV_VARIABLE: ${ENV_VARIABLE}
    #  NEXT_PUBLIC_ENV_VARIABLE: ${NEXT_PUBLIC_ENV_VARIABLE}

    # Set environment variables based on the .env file
    env_file:
      - .env.example
    volumes:
      - ./backend/src:/app/src
    depends_on:
      - db
    ports:
      - 3000:3000
    networks:
      - summarizer

  frontend:
    container_name: angular
    restart: always
    build:
      context: ./frontend
      dockerfile: dev.Dockerfile
    volumes:
      - ./frontend/src:/app/src
    ports:
      - 4200:4200
    networks:
      - summarizer

networks:
  summarizer:
